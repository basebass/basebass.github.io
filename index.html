<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Base</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="content">
        <img id="mainImage" src="websitemain.png" alt="Website Main Image">
        <!-- Adding extra content to ensure you can scroll and see the image -->
        <div class="image-buttons">
            <a href="" target="_blank">
                <img src="dexbutton.png" alt="Dex Button">
            </a>
            <a href="" target="_blank">
                <img src="twitterbutton.png" alt="Twitter Button">
            </a>
            <a href="" target="_blank">
                <img src="telegrambutton.png" alt="Telegram Button">
            </a>
        </div>
    </div>
    <footer>
        <p>
            CA: 0x000000000000000000000000000000000
            <button class="copy-button" onclick="copyToClipboard()">Copy</button>
        </p>
    </footer>

    <script>
        function adjustBodyHeight() {
            const mainImage = document.getElementById('mainImage');
            if (mainImage) {
                document.body.style.height = mainImage.clientHeight + 'px';
            }
        }

        window.addEventListener('load', adjustBodyHeight);
        window.addEventListener('resize', adjustBodyHeight);

        function copyToClipboard() {
            const address = "0xcbf1Ce1D5A8E9e9c88e8ADCA0b2BdD56FB71B21A";
            const textarea = document.createElement("textarea");
            textarea.value = address;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            alert("Copied to clipboard: " + address);
        }
    </script>
</body>
</html>
