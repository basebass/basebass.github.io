<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FOG</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6C7A89, #BDC3C7, #2C3E50);
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .fog {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .fog img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: auto;
            height: auto;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            animation: fog-roll 120s linear infinite;
            }


        @keyframes fog-roll {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .logo-container {
            width: 250px;
            height: 250px;
            perspective: 1000px;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            transform-origin: center;
            animation: swivel 3s infinite linear;
        }

        @keyframes swivel {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }
        
        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin: 20px;
            color: #BDC3C7;
            text-shadow: 2px 2px #000;
        }
        
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            color: #ffffff;
            background: #7f8c8d;
            transition: background 0.3s ease;
        }
        
        .button:hover {
            background: #5c5c5c;
        }

        .button img {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="fog" id="fog">
        <img src="fogclouds.webp" alt="Fog Clouds">
    </div>

    <h1>THE FOG IS COMING</h1>

    <div class="logo-container">
        <img src="icon.png" alt="Pepe Logo">
    </div>

    <a class="button" href="" target="_blank">
        <img src="pumpfun.png" alt="PumpFun Logo">PumpFun
    </a>
    <a class="button" href="https://x.com/pepethefog_sol" target="_blank">
        <img src="twitter.png" alt="Twitter Logo">Twitter
    </a>
    <a class="button" href="https://t.me/pepedafog" target="_blank">
        <img src="telegram.png" alt="Telegram Logo">Telegram
    </a>
</body>
</html>
